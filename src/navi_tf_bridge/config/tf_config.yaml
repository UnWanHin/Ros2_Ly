target_rel_to_goal_pos_node:
  ros__parameters:
    input_topic: /ly/navi/target_rel
    input_goal_pos_raw_topic: /ly/navi/goal_pos_raw
    output_goal_pos_topic: /ly/navi/goal_pos
    output_target_map_topic: /ly/navi/target_map

    # TF frame settings
    map_frame: map
    base_frame: base_link
    fallback_base_frame: baselink
    use_msg_frame_id: true

    publish_target_map: true
    invert_y_axis: false
    y_axis_max_cm: 1500

    preferred_distance_cm: 100
    distance_deadband_cm: 50
    stop_when_no_target: true
    allow_reverse_goal: false
    enable_goal_pos_raw_bridge: true
    goal_pos_raw_frame: map

    # Raw goal static calibration (official-map points -> output map frame)
    # When enabled:
    #   /ly/navi/goal_pos_raw is treated as points in raw_goal_source_frame
    #   and converted by the fitted 2D transform before publishing /ly/navi/goal_pos.
    # Model:
    #   rigid  : rotation + translation
    #   affine : 2x2 linear + translation (supports mirror/scale/shear)
    use_raw_goal_static_calibration: false
    raw_goal_calibration_model: affine
    raw_goal_calibration_unit: cm
    raw_goal_source_frame: official_map
    raw_goal_target_frame: map
    # Flattened point list: [x1, y1, x2, y2, x3, y3, ...]
    # Keep these two lines commented until you fill real pairs.
    # raw_goal_source_points: [393, 810, 2408, 683, 980, 1124]
    # raw_goal_target_points: [402, 796, 2397, 701, 995, 1136]

    # Debug export (for comparing Area.hpp map points with TF-converted points)
    debug_export_point_pairs: true
    debug_points_reference_frame: map
    debug_area_header_file: ""
    debug_point_pairs_output_file: ""
